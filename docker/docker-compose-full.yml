# Trivaro Prop Firm - Complete Docker Setup
# Run this file with: docker compose -f docker/docker-compose-full.yml up -d

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: trivaro-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: trivaro
      MONGO_INITDB_ROOT_PASSWORD: trivaro123
      MONGO_INITDB_DATABASE: trivaro
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - trivaro-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: trivaro-redis
    restart: always
    command: redis-server --requirepass trivaro123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trivaro-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Backend API Server
  backend:
    image: docker-backend:latest
    container_name: trivaro-backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://trivaro:trivaro123@mongodb:27017/trivaro?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: trivaro123
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      JWT_SECRET: trivaro-super-secret-jwt-key-2024
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      META_API_TOKEN: ""
      STRIPE_SECRET_KEY: sk_test_51QxXxxXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      EMAIL_SERVICE: sendgrid
      SENDGRID_API_KEY: ""
      ENABLE_CRON_JOBS: "true"
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - trivaro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Web Application
  frontend:
    image: docker-frontend:latest
    container_name: trivaro-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - trivaro-network

# Named volumes for data persistence
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local

# Docker network
networks:
  trivaro-network:
    driver: bridge
